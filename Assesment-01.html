<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Marks Management System</title>
    <link rel="stylesheet" href="Assesment-01.css">
</head>
<body>
<h1>Student Marks Management System</h1>
<div class="container">
    <h2>Enter Student Details</h2>
    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">
    <input type="number" id="math" placeholder="Math Marks">
    <input type="number" id="science" placeholder="Science Marks">
    <input type="number" id="english" placeholder="English Marks">
    <div class="buttons">
        <button onclick="addStudent()">Add Student</button>
        <button onclick="displayStudents()">Display Students</button>
        <button onclick="showTotals()">Show Total Marks</button>
        <button onclick="showAverage()">Show Average</button>
        <button onclick="topStudents()">Students Above 80</button>
        <button onclick="failedStudents()">Failed Students</button>
        <button onclick="countStudents()">Count Students</button>
    </div>
</div>
<div id="output">
    <h2>Results</h2>
</div>
<script src="Assesment-01.js"></script>
</body>
</html>
